name: kammun_app
description: A new Flutter project.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 2.0.0+7

environment:
  sdk: ">=2.7.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter


  flutter_localizations:
    sdk: flutter  
  flutter_svg: ^0.18.0
  carousel_pro: ^1.0.0
  auto_size_text: ^3.0.0
  search_choices: ^1.0.17
  #font_awesome_flutter: ^8.12.0
  toast: ^0.2.9
  fluttertoast: ^7.1.8
  flutter_screenutil:
  pretty_dio_logger: ^1.1.1
  shared_preferences: ^2.0.13
  firebase_core: ^2.8.0
  firebase_messaging: ^14.3.0
  firebase_analytics: ^10.1.5
  full_screen_image: ^1.0.2
  #cached_network_image: ^3.2.0
  device_info_plus: ^1.0.0
  package_info_plus: ^1.0.1
  url_launcher: ^6.0.20
  pinput: ^2.2.20
  adv_image_cache: ^1.0.4
  dio: ^4.0.4
  share: ^2.0.4
  shimmer: ^2.0.0
  responsive_flutter: ^0.0.4
  modal_bottom_sheet: ^2.0.1
  animated_background: ^2.0.0
  qr_mobile_vision: ^3.0.1
  map_launcher: ^3.0.0
  image_picker: ^0.8.4+1
  file_picker: ^4.5.1
  http: ^0.13.4
  flutter_datetime_picker: ^1.5.0
  call_log: ^3.2.2
  expandable: ^5.0.1
  syncfusion_flutter_charts: ^20.1.48
  overlay_support: ^2.0.1
  just_audio: ^0.9.28
  equatable: ^2.0.3
  dartz: ^0.10.1
  flutter_redux: ^0.9.0
  get_it: ^7.2.0

flutter_icons:
  image_path: 'assets/kmIcon.png'
  android: true
  ios: true

dev_dependencies:
  flutter_lints: ^1.0.4
  flutter_test:
    sdk: flutter

flutter:

  uses-material-design: true

  assets:
    - assets/


  fonts:
     - family: Tajawal
       fonts:
          - asset: fonts/Tajawal-Black.ttf
          - asset: fonts/Tajawal-Bold.ttf
          - asset: fonts/Tajawal-ExtraBold.ttf
          - asset: fonts/Tajawal-ExtraLight.ttf
          - asset: fonts/Tajawal-Light.ttf
          - asset: fonts/Tajawal-Medium.ttf
          - asset: fonts/Tajawal-Regular.ttf
     - family:  BareCodeIcon
       fonts:
          - asset: fonts/BareCodeIcon.ttf
     - family:  Coins
       fonts:
          - asset: fonts/Coins.ttf