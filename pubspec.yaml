name: kammun_app
description: A new Flutter project.

# The following line prevents the package from being accidentally published to
# pub.dev using `pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number used as CFBundleVersion.


version: 2.0.0+7

environment:
  sdk: ">=2.7.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter


  flutter_localizations:
    sdk: flutter  

  carousel_pro: ^1.0.0
  auto_size_text: ^3.0.0
  badges: ^2.0.2
  search_choices: ^2.0.19
  font_awesome_flutter: ^10.0.0
  toast: ^0.1.5
  shared_preferences: ^2.0.13
  firebase_core: ^1.14.1
  firebase_messaging: ^11.2.13
  full_screen_image: ^1.0.2
  url_launcher: ^6.0.20
  package_info: ^2.0.2
  adv_image_cache: ^1.0.4
  dio: ^4.0.4
  share: ^2.0.4
  group_button: ^4.6.0
  flushbar: ^1.10.4
  shimmer: ^2.0.0
  location: ^4.3.0
  responsive_flutter: ^0.0.4
  modal_bottom_sheet: ^2.0.1
  flutter_rating_bar: ^4.0.0
  animated_background: ^2.0.0
  custom_splash: ^0.0.2
  qr_mobile_vision: ^3.0.1
  path_provider: ^2.0.9
  map_launcher: ^2.2.1+1
  flutter_launcher_icons: ^0.9.2
  image_picker: ^0.8.3+3
  file_picker: ^4.5.1
  http: ^0.13.4
  http_parser: ^4.0.0
  flutter_datetime_picker: ^1.5.1
  image_viewer: ^1.5.0
  call_log: ^3.2.2
  expandable: ^5.0.1
  syncfusion_flutter_charts: ^20.1.48
  flutter_libphonenumber: ^1.2.4
  overlay_support: ^2.0.1
  just_audio: ^0.9.28
  equatable: ^2.0.3
  dartz: ^0.10.1
  flutter_redux: ^0.9.0
  get_it: ^7.2.0
  internet_connection_checker: ^0.0.1+3



flutter_icons:
  image_path: 'assets/kmIcon.png'
  android: true
  ios: true

dev_dependencies:
  flutter_lints: ^1.0.4
  flutter_test:
    sdk: flutter

flutter:

  uses-material-design: true

  assets:
    - assets/


  fonts:
     - family: Tajawal
       fonts:
          - asset: fonts/Tajawal-Black.ttf
          - asset: fonts/Tajawal-Bold.ttf
          - asset: fonts/Tajawal-ExtraBold.ttf
          - asset: fonts/Tajawal-ExtraLight.ttf
          - asset: fonts/Tajawal-Light.ttf
          - asset: fonts/Tajawal-Medium.ttf
          - asset: fonts/Tajawal-Regular.ttf
     - family:  BareCodeIcon
       fonts:
          - asset: fonts/BareCodeIcon.ttf