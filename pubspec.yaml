name: kammun_app
description: A new Flutter project.

# The following line prevents the package from being accidentally published to
# pub.dev using `pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
version: 2.0.0+7

environment:
  sdk: ">=2.7.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter


  flutter_localizations:
    sdk: flutter  

  carousel_pro: ^1.0.0
  auto_size_text: ^2.1.0
  badges: ^1.1.4
  searchable_dropdown: ^1.1.0
  sms_autofill: ^1.1.1
  font_awesome_flutter: ^8.7.0
  toast: ^0.1.5
  shared_preferences: ^0.5.8
  firebase_messaging: ^6.0.13
  full_screen_image: ^1.0.2
  url_launcher: ^5.4.1
  package_info: ^0.4.0+16
  # cache_image: ^1.0.5
  adv_image_cache: ^0.1.3
  dio: ^3.0.10
  share: ^0.6.4+3
  auto_size_text_field: ^0.1.5
  group_button: ^1.0.2
  flushbar: ^1.10.4   
  shimmer: ^1.1.2
  flutter_bloc: ^6.1.0
  # location: ^3.0.2
  responsive_flutter: ^0.0.4
  modal_bottom_sheet: ^1.0.0+1
  flutter_rating_bar: ^3.2.0+1
  animated_background: ^1.0.5
  custom_splash: ^0.0.2
  map_launcher: ^1.1.1
  flutter_launcher_icons: ^0.8.0
  image_picker: ^0.6.7+22
  file_picker: ^1.13.3
  http: ^0.12.2
  http_parser: ^3.1.4
  flutter_uploader: ^1.2.0
  flutter_datetime_picker: ^0.1.9
  image_viewer: ^1.0.0
  qr_mobile_vision: ^2.0.0
  # location:
  #   git:
  #     url: git://github.com/dreambitio/flutterlocation.git
  #     ref: release/3.2.4
  #     path: location/

flutter_icons:
  image_path: 'assets/kmIcon.png'
  android: true
  ios: true

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:

  uses-material-design: true

  assets:
    - assets/


  fonts:
     - family: Tajawal
       fonts:
          - asset: fonts/Tajawal-Black.ttf
          - asset: fonts/Tajawal-Bold.ttf
          - asset: fonts/Tajawal-ExtraBold.ttf
          - asset: fonts/Tajawal-ExtraLight.ttf
          - asset: fonts/Tajawal-Light.ttf
          - asset: fonts/Tajawal-Medium.ttf
          - asset: fonts/Tajawal-Regular.ttf
     - family:  BareCodeIcon
       fonts:
          - asset: fonts/BareCodeIcon.ttf